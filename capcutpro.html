<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapCut Profile</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: white;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            color: white;
        }
        .profile-container {
            background: black;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            padding: 25px;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-pic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #00f5ff;
            object-fit: cover;
            margin: 0 auto 12px auto;
        }
        .username {
            font-size: 22px;
            font-weight: 700;
            margin: 0;
        }
        .user-id {
            color:white;
            font-size: 14px;
            margin: 4px 0 18px 0;
        }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin-bottom: 25px;
        }
        .stat {
            text-align: center;
        }
        .stat strong {
            display: block;
            font-size: 18px;
            font-weight: 700;
        }
        .stat span {
            font-size: 13px;
            color:white;
        }
        .button-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .menu-btn {
            background: white;
            border: 1px solid #4a4d5e;
            border-radius: 10px;
            padding: 16px 12px;
            color: black;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .menu-btn:hover {
            background:white;
            border-color: white;
            transform: translateY(-2px);
        }
        .menu-btn svg {
            width: 22px;
            height: 22px;
            fill: #00f5ff;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Profile Info -->
        <div class="profile-header">
            <img src="ppic.jpeg" alt="Profile Picture" class="profile-pic">
            <h2 class="Trixie Anne Billones">Trixie Anne Billones</h2>
            <p class="user-id">@yourcapcutid</p>
        </div>

        <!-- Following & Followers -->
        <div class="profile-stats">
            <div class="stat">
                <strong>156</strong>
                <span>Following</span>
            </div>
            <div class="stat">
                <strong>12.5K</strong>
                <span>Followers</span>
            </div>
        </div>

        <!-- Buttons: About Me, Resume, Education, Photo Gallery -->
        <div class="button-menu">
            <!-- About Me -->
            <a href="About Me.html" class="menu-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                About Me
            </a>

            <!-- Resume -->
            <a href="Myresume.html" class="menu-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                </svg>
                Resume
            </a>

            <!-- Educational Background -->
            <a href="Edu background.html" class="menu-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
                </svg>
                Education
            </a>

            <!-- Photo Gallery -->
            <a href="prompage.html"class="menu-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
                Promotional Page
            </a>
        </div>
    </div>
</body>
</html>
