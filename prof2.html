<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapCut Profile</title>
<style>
body { 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
  background: palevioletred; 
  margin: 0; 
  padding: 20px; 
  display: flex; 
  justify-content: center; 
  color: black; 
}
.capcut-profile { 
  background: lightpink; 
  border-radius: 12px; 
  max-width: 400px; 
  width: 100%; 
  padding: 24px; 
}
.profile-top { text-align: center; margin-bottom: 20px; }
.profile-pic { 
  width: 90px; 
  height: 90px; 
  border-radius: 50%; 
  border: 3px solid black; 
  object-fit: cover; 
  margin: 0 auto 12px auto; 
}
.username { font-size: 20px; font-weight: 700; margin: 0; }
.user-id { color: palevioletred; font-size: 14px; margin: 4px 0 16px 0; }
.profile-stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 16px; }
.stat { text-align: center; }
.stat strong { display: block; font-size: 18px; font-weight: 700; }
.stat span { font-size: 13px; color: black; }
.bio { text-align: center; font-size: 14px; line-height: 1.5; color: black; margin-bottom: 20px; }
.profile-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
.btn { 
  flex: 1; 
  padding: 10px 0; 
  border-radius: 8px; 
  font-weight: 600; 
  font-size: 15px; 
  cursor: pointer; 
  text-align: center; 
  border: none; 
}
.btn-follow { background: palevioletred; color: black; }
.btn-follow.following { background: #3a3d4d; color: #fff; }
.btn-message { background: palevioletred; color: black; }
.tabs { display: flex; border-bottom: 1px solid palevioletred; margin-bottom: 15px; }
.tab { 
  flex: 1; 
  text-align: center; 
  padding: 12px 0; 
  font-size: 15px; 
  font-weight: 600; 
  color: gray; 
  cursor: pointer; 
}
.tab.active { color: palevioletred; border-bottom: 2px solid black; }

/* VIDEO GRID WITH EXACT 9:16 SIZE */
.video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
.video-item { 
  position: relative; 
  width: 100%; 
  aspect-ratio: 9/16; 
  background: #000; 
  border-radius: 4px; 
  overflow: hidden; 
  cursor: pointer; /* shows it's clickable */
}
.video-item video { 
  width: 100%; 
  height: 100%; 
  object-fit: cover; 
  display: block; 
}
.video-views { 
  position: absolute; 
  bottom: 5px; 
  left: 5px; 
  font-size: 12px; 
  color: white; 
  display: flex; 
  align-items: center; 
  gap: 3px; 
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  pointer-events: none; /* so click passes through to video */
}
.play-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  color: white;
  opacity: 0.8;
  pointer-events: none;
}
</style>
</head>
<body>
<div class="capcut-profile">
  <div class="profile-top">
    <!-- FIX: Use relative path. Put profile.jpg in same folder as HTML -->
    <img src="profile.jpg.jpg" width="200" class="profile-pic" alt="profile">
    <h2 class="username">Diane Magbanua</h2>
    <p class="user-id">@_dnynclr</p>
  </div>

  <div class="profile-stats">
    <div class="stat"><strong>7</strong><span>Following</span></div>
    <div class="stat"><strong>2.1M</strong><span>Followers</span></div>
    <div class="stat"><strong>32.5M</strong><span>Likes</span></div>
  </div>

  <p class="bio">📧 yanniemagbanua@gmail.com</p>

    <div class="profile-buttons">
       <a href="CAPCUT-PROFILE.html" target="_blank" class="btn btn-follow">Follow</a>
      <a href="CAPCUT-PROFILE.html" target="blank" class="btn btn-message" id="followBtn">Message</a>
     
    </div>


  <div class="tabs">
    <div class="tab active">Videos</div>
    <div class="tab">Liked</div>
  </div>

  <!-- VIDEO GRID - CLICK TO PLAY WITH SOUND -->
  <div class="video-grid">
    <div class="video-item" onclick="playVideo(this)">
      <video src="suga-video.mp4.mp4" loop playsinline></video>
      <div class="play-icon">▶</div>
      <div class="video-views">▶ 12.8M</div>
    </div>

    <div class="video-item" onclick="playVideo(this)">
      <video src="S.mp4.mp4" loop playsinline></video>
      <div class="play-icon">▶</div>
      <div class="video-views">▶ 20.1M</div>
    </div>

    <div class="video-item" onclick="playVideo(this)">
      <video src="U.mp4.mp4" loop playsinline></video>
      <div class="play-icon">▶</div>
      <div class="video-views">▶ 28M</div>
    </div>

    <div class="video-item" onclick="playVideo(this)">
      <video src="G.mp4.mp4" loop playsinline></video>
      <div class="play-icon">▶</div>
      <div class="video-views">▶ 5.4M</div>
    </div>

    <div class="video-item" onclick="playVideo(this)">
      <video src="A.mp4.mp4" loop playsinline></video>
      <div class="play-icon">▶</div>
      <div class="video-views">▶ 9.2M</div>
    </div>

    <div class="video-item" onclick="playVideo(this)">
      <video src="YOONGI.mp4.mp4" loop playsinline></video>
      <div class="play-icon">▶</div>
      <div class="video-views">▶ 15M</div>
    </div>
  </div>
</div>

<script>
// CLICK VIDEO = PLAY WITH SOUND
function playVideo(item) {
  const video = item.querySelector('video');
  const icon = item.querySelector('.play-icon');
  
  if (video.paused) {
    // Stop all other videos first
    document.querySelectorAll('video').forEach(v => {
      if (v !== video) {
        v.pause();
        v.parentElement.querySelector('.play-icon').style.display = 'block';
      }
    });
    
    video.muted = false; // unmute for sound
    video.play();
    icon.style.display = 'none'; // hide play button
  } else {
    video.pause();
    icon.style.display = 'block'; // show play button
  }
}

// Follow button toggle
function toggleFollow(btn) {
  if(btn.classList.contains('following')) {
    btn.classList.remove('following');
    btn.textContent = 'Follow';
  } else {
    btn.classList.add('following');
    btn.textContent = 'Following';
  }
}
</script>
</body>
</html>
