<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Capcut-Logo</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f4f4f4;
        font-family:Arial, sans-serif;
    }

    .logo{
        display:flex;
        align-items:center;
        gap:15px;
        background:white;
        padding:20px 30px;
        border-radius:20px;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .icon{
        width:60px;
        height:60px;
        border:5px solid black;
        border-radius:15px;
        position:relative;
        transform:rotate(45deg);
    }

    .icon::before,
    .icon::after{
        content:"";
        position:absolute;
        background:black;
        border-radius:10px;
    }

    .icon::before{
        width:45px;
        height:10px;
        top:22px;
        left:3px;
    }

    .icon::after{
        width:10px;
        height:45px;
        top:3px;
        left:22px;
    }

    .text{
        font-size:32px;
        font-weight:bold;
        letter-spacing:2px;
        color:#111;
    }

    .text span{
        color:#555;
    }
</style>
</head>
<body>

<div class="logo">
    <div class="icon"></div>
    <div class="text">Cap<span>Cut</span></div>
</div>

</body>
</html>
