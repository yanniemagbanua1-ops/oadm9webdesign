<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body { 
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, palevioletred, #ff8fa3);
  min-height: 100vh;
  margin: 0;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
}

.capcut-profile { 
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 30px;
  max-width: 420px;
  width: 100%;
  padding: 35px 30px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  transition: transform 0.3s ease;
}

.capcut-profile:hover {
  transform: translateY(-5px);
}

.profile-top { 
  text-align: center; 
  margin-bottom: 25px; 
}

.profile-pic { 
  width: 110px; 
  height: 110px; 
  border-radius: 50%; 
  border: 4px solid rgba(255, 255, 255, 0.8);
  object-fit: cover; 
  margin: 0 auto 15px auto;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
  transition: all 0.3s ease;
}

.profile-pic:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
}

.username { 
  font-size: 26px; 
  font-weight: 700; 
  margin: 0;
  letter-spacing: 0.5px;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
}

.bio { 
  text-align: center; 
  font-size: 15px; 
  line-height: 1.6; 
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 30px;
  font-weight: 400;
}

/* NAV BUTTONS - GLASS STYLE */
.nav-buttons { 
  display: flex; 
  flex-direction: column;
  gap: 12px; 
  margin-bottom: 10px;
}

.nav-buttons a { 
  padding: 14px 0; 
  border-radius: 15px; 
  font-weight: 600; 
  font-size: 15px; 
  cursor: pointer; 
  text-align: center; 
  text-decoration: none; 
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.2);
  color: white;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.nav-buttons a:hover { 
  background: rgba(255, 255, 255, 0.35);
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
  border-color: rgba(255, 255, 255, 0.5);
}

/* Optional: Add subtle animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.capcut-profile {
  animation: fadeIn 0.6s ease-out;
}

.nav-buttons a:nth-child(1) { animation: fadeIn 0.6s ease-out 0.1s both; }
.nav-buttons a:nth-child(2) { animation: fadeIn 0.6s ease-out 0.2s both; }
.nav-buttons a:nth-child(3) { animation: fadeIn 0.6s ease-out 0.3s both; }
.nav-buttons a:nth-child(4) { animation: fadeIn 0.6s ease-out 0.4s both; }
</style>
</head>
<body>
<div class="capcut-profile">
  <div class="profile-top">
    <!-- FIX: Use relative path. Put photo.jpg in same folder as HTML -->
    <img src="photo.jpg.jpg" width="200" class="profile-pic" alt="profile">
    <h2 class="username">Yannah</h2>
  </div>
  
  <p class="bio"> WELCOME TO MY ACCOUNT</p>

  <!-- NAV BUTTONS -->
  <div class="nav-buttons">
    <a href="ABOUTME.html">👤 ABOUT ME</a>
    <a href="EDUCATIONALCONTACT.html">🎓 EDUCATION</a>
    <a href="RESUME.html">📄 RESUME</a>
    <a href="PROMOTION.html">🔎 PROMOTION</a>
  </div>
</div>
</body>
</html>
